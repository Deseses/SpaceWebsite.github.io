<!DOCTYPE html><html lang="ru"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="icon" href="/Fan.7fdc2ea3.png" sizes="any">
    <link rel="stylesheet" href="/regist.77563efa.css">
</head>
<body>
    <div id="stars-container"></div>
    
    <div class="form-container">
        <h2>Регистрация</h2>
        <form class="form-grid">
            <div class="input-group field-name">
                <label for="name">Имя</label>
                <input type="text" id="name" required="">
            </div>
            
            <div class="input-group field-surname">
                <label for="surname">Фамилия</label>
                <input type="text" id="surname" required="">
            </div>
            
            <div class="input-group field-email">
                <label for="email">Email</label>
                <input type="email" id="email" required="">
            </div>
            
            <div class="input-group field-phone">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" required="">
            </div>
            
            <div class="input-group full-width field-password">
                <label for="password">Пароль</label>
                <input type="password" id="password" required="">
            </div>
            
            <div class="input-group full-width field-confirm">
                <label for="confirm">Подтвердите пароль</label>
                <input type="password" id="confirm" required="">
            </div>
            
            <div class="terms-group full-width field-terms">
                <input type="checkbox" id="terms" required="">
                <label for="terms">Я принимаю условия соглашения</label>
            </div>
            
            <div class="captcha">
                <div id="captchaText" style="margin-bottom: 10px; font-weight: bold"></div>
                <input type="text" id="userInput" placeholder="Введите ответ">
            </div>
            <button id="submitBtn" disabled="">Отправить</button>
            <script src="/regist.4a9d2316.js"></script>

            <button type="submit" class="full-width field-submit">Зарегистрироваться</button>
            
            <div class="login-link full-width field-login">
                Уже есть аккаунт? <a href="/index.html">Войти</a>
            </div>
        </form>
        </div>
        <div id="message"></div>
    
    <script src="/proect.e220975e.js"></script>

<script src="/regist.888b6c2a.js"></script></body></html>
