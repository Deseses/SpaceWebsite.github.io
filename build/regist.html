<!DOCTYPE html><html lang=ru><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0"><title>Регистрация</title><link rel=icon href=Fan.c2406bd0.png sizes=any><link rel=stylesheet href=regist.9f912e91.css><body>
    <div id=stars-container></div>
    
    <div class=form-container>
        <h2>Регистрация</h2>
        <form class=form-grid>
            <div class="field-name input-group">
                <label for=name>Имя</label>
                <input id=name required>
            </div>
            
            <div class="field-surname input-group">
                <label for=surname>Фамилия</label>
                <input id=surname required>
            </div>
            
            <div class="field-email input-group">
                <label for=email>Email</label>
                <input type=email id=email required>
            </div>
            
            <div class="field-phone input-group">
                <label for=phone>Телефон</label>
                <input type=tel id=phone required>
            </div>
            
            <div class="field-password full-width input-group">
                <label for=password>Пароль</label>
                <input type=password id=password required>
            </div>
            
            <div class="field-confirm full-width input-group">
                <label for=confirm>Подтвердите пароль</label>
                <input type=password id=confirm required>
            </div>
            
            <div class="field-terms full-width terms-group">
                <input type=checkbox id=terms required>
                <label for=terms>Я принимаю условия соглашения</label>
            </div>
            
            <div class=captcha>
                <div id=captchaText style=margin-bottom:10px;font-weight:700></div>
                <input id=userInput placeholder="Введите ответ">
            </div>
            <button id=submitBtn disabled>Отправить</button>
            <script src=regist.bc3cfb18.js></script>

            <button class="field-submit full-width">Зарегистрироваться</button>
            
            <div class="field-login full-width login-link">
                Уже есть аккаунт? <a href=index.html>Войти</a>
            </div>
        </form>
        </div>
        <div id=message></div>
    
    <script src=proect.a4c545c7.js></script>
